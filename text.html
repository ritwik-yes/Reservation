<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reservation Confirmed</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1c1c1c;
      border-radius: 16px;
      padding: 32px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      text-align: center;
    }

    .logo {
      font-size: 22px;
      letter-spacing: 3px;
      margin-bottom: 20px;
      color: #f5f5f5;
    }

    .title {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 26px;
    }

    .details {
      text-align: left;
      margin-bottom: 30px;
    }

    .details p {
      font-size: 14px;
      margin: 8px 0;
      color: #ddd;
    }

    .button {
      display: inline-block;
      padding: 12px 22px;
      background: #fff;
      color: #000;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .button:hover {
      background: #e6e6e6;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      font-style: italic;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo">KOEN</div>

    <div class="title">Reservation Confirmed</div>
    <div class="subtitle">An experience designed for two</div>

    <div class="details">
      <p><strong>Guest:</strong> Pujitha Mudhelli and Ritwik Gupta </p>
      <p><strong>Party Size:</strong> 2</p>
      <p><strong>Experience:</strong> Japanese BBQ & Izakaya</p>
      <p><strong>Status:</strong> Confirmed</p>
      <p><strong>Time:</strong> 7:30 PM</p>
    </div>

    <a href="https://www.google.com/maps/search/?api=1&query=Koen+Japanese+BBQ+%26+Izakaya+Omaha"
       target="_blank"
       class="button">
       View Location
    </a>

    <div class="footer">
      Not just dinner — our first date.
    </div>
  </div>

</body>
</html>
